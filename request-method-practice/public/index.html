<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Request Method Practice</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>Request Method Practice</h1>
      <p>Use the buttons to practice sending requests to the ready-made API.</p>

      <div class="buttons">
        <button id="getBtn">GET notes</button>
        <button id="postBtn">POST note</button>
        <button id="putBtn">PUT note 1</button>
        <button id="patchBtn">PATCH note 1</button>
        <button id="deleteBtn">DELETE note 1</button>
      </div>

      <pre id="output">Click a button to send a request.</pre>
    </main>

    <script src="app.js"></script>
  </body>
</html>
